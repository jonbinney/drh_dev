run_id: jdb-b9w10-baseconfig
quoridor:
  board_size: 9
  max_walls: 10
  max_steps: 100
alphazero:
  network:
    type: resnet
    num_blocks: 6
    num_channels: 32
  mcts_n: 1000
  mcts_c_puct: 1.2
wandb:
  project: B9W10
  upload_model:
    every: 100 models
    when_max:
    - raw_win_perc
    - p2_win_perc
    when_min:
    - dumb_score
self_play:
  program: rust
  num_processes: 1
  mcts_worker_threads: 12
  games_per_process: 128
  eval_batch_size: 1024
  leaf_parallelism: 16
  virtual_loss: 3
  enable_tree_reuse: true
  eval_cache_max_size: 1000000
  eval_max_wait_ms: 1
  alphazero:
    mcts_noise_epsilon: 0.25
training:
  games_per_training_step: 50
  learning_rate: 0.001
  batch_size: 2048
  weight_decay: 0.0001
  replay_buffer_size: 20000
  max_cached_games: 20000
  finish_after: 9999999 hours
benchmarks:
- every: 1 models
  jobs:
  - type: tournament
    alphazero:
      mcts_n: 0
    prefix: raw
    times: 10
    opponents:
    - random
    - greedy:p_random=0.3,nick=greedy-03
    - greedy
    - simple:branching_factor=16,nick=simple-bf16
- every: 1 models
  jobs:
  - type: tournament
    prefix: full
    times: 10
    opponents:
    - random
    - greedy:p_random=0.3,nick=greedy-03
    - greedy
    - simple:branching_factor=16,nick=simple-bf16
